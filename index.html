<!DOCTYPE html>
<html lang="it" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aruta.sh — Tome of the Wandering Mage</title>
    <meta name="description" content="Stefano Aruta — Streamer, Programmer, Adventurer.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧙</text></svg>">
    <meta name="theme-color" id="meta-theme-color" content="#0c0a1a">
    <meta property="og:type"        content="website">
    <meta property="og:url"         content="https://aruta.sh">
    <meta property="og:title"       content="Aruta.sh — The Wandering Mage">
    <meta property="og:description" content="Streamer · Programmer · Adventurer.">
    <meta property="og:image"       content="https://aruta.sh/Images/aru2_meta.png">
    <link rel="canonical"           href="https://aruta.sh">
    <meta name="keywords"           content="Aruta, streamer, programmer, Twitch, Kick, YouTube, gaming, anime, Ultima Online, Minecraft">
    <meta name="twitter:card"       content="summary_large_image">
    <meta name="twitter:site"       content="@arutash">
    <meta name="twitter:title"      content="Aruta.sh — The Wandering Mage">
    <meta name="twitter:image"      content="https://aruta.sh/Images/aru2_meta.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preload" as="image" href="./Images/aru2_meta.png">
    <link rel="stylesheet" href="Style/style.css">
    <script src="https://cdn.jsdelivr.net/npm/vanilla-tilt@1.8.1/dist/vanilla-tilt.min.js" defer></script>
</head>
<body>

<!-- ░░ RUNE PARTICLE CANVAS ░░ -->
<canvas id="rune-bg" aria-hidden="true"></canvas>

<!-- ░░ MAGIC CURSOR ░░ -->
<div id="magic-cursor" aria-hidden="true">
    <div class="cursor-ring"></div>
    <div class="cursor-dot"></div>
</div>

<!-- ░░ CSS MAGIC BACKGROUND (no canvas, GPU only) ░░ -->
<div class="magic-bg" aria-hidden="true">
    <svg class="bg-ring bg-ring-1" viewBox="0 0 900 900">
        <circle cx="450" cy="450" r="420" fill="none" stroke="currentColor" stroke-width="1"   stroke-dasharray="6 14"  opacity="0.07"/>
        <polygon points="450,50 800,650 100,650"       fill="none" stroke="currentColor" stroke-width="0.8"                   opacity="0.045"/>
        <circle cx="450" cy="450" r="310" fill="none" stroke="currentColor" stroke-width="0.8" stroke-dasharray="3 10"  opacity="0.055"/>
        <circle cx="450" cy="450" r="180" fill="none" stroke="currentColor" stroke-width="0.6" stroke-dasharray="2 8"   opacity="0.04"/>
    </svg>
    <svg class="bg-ring bg-ring-2" viewBox="0 0 600 600">
        <circle cx="300" cy="300" r="280" fill="none" stroke="currentColor" stroke-width="0.8" stroke-dasharray="4 10" opacity="0.05"/>
        <polygon points="300,30 540,440 60,440"        fill="none" stroke="currentColor" stroke-width="0.6"                  opacity="0.035"/>
    </svg>
</div>

<!-- ░░ AMBIENT FOG ░░ -->
<div class="ambient-fog" aria-hidden="true">
    <div class="fog-layer"></div>
    <div class="fog-layer"></div>
    <div class="fog-layer"></div>
</div>

<!-- ░░ SUMMONING OVERLAY ░░ -->
<div id="summon-overlay">
    <canvas id="summon-canvas"></canvas>
    <div class="summon-text-wrap">
        <div class="summon-logo">✦ ARUTA.SH ✦</div>
        <div id="summon-log"></div>
    </div>
</div>

<!-- ░░ APP ░░ -->
<main id="app" class="hidden">

    <!-- ══ HUD BAR ══ -->
    <header class="hud-bar">
        <!-- Left: brand + section nav -->
        <div class="hud-left">
            <span class="hud-rune" aria-hidden="true">⚜</span>
            <nav class="sec-nav" aria-label="Sections">
                <button class="sec-btn active" data-sec="home">🏰 <span data-i18n="sec_home">Home</span></button>
                <button class="sec-btn"        data-sec="about">📖 <span data-i18n="sec_about">About</span></button>
                <button class="sec-btn"        data-sec="links">🔗 <span data-i18n="sec_links">Links</span></button>
            </nav>
        </div>
        <!-- Center: clock -->
        <div class="hud-clock">
            <span class="hud-date" id="hud-date">----/--/--</span>
            <span class="hud-clock-sep" aria-hidden="true">·</span>
            <span class="hud-time" id="hud-time">--:--:--</span>
        </div>
        <!-- Right: lang + theme -->
        <div class="hud-right">
            <select id="lang-select" class="lang-select" aria-label="Language">
                <option value="it">IT</option>
                <option value="en">EN</option>
                <option value="es">ES</option>
                <option value="ja">JA</option>
                <option value="fn">ᚠᚾ</option>
            </select>
            <button class="theme-btn" id="theme-btn" title="Toggle theme">
                <i class="fas fa-moon" id="theme-icon"></i>
            </button>
        </div>
    </header>

    <!-- ══ CONTENT ══ -->
    <div class="content-wrap">

        <!-- ── SECTION: Home ── -->
        <section class="page-section" id="sec-home">
            <div class="home-hero">
                <div class="magic-circle-frame">
                    <!-- Outer ring: triple rings + 12 rune nodes + text arc (CW, slow) -->
                    <svg class="mc-svg mc-outer" viewBox="0 0 200 200" aria-hidden="true">
                        <defs>
                            <path id="mc-text-ring" d="M 8,100 A 92,92 0 0,1 192,100 A 92,92 0 0,1 8,100"/>
                        </defs>
                        <!-- Triple outer rings -->
                        <circle cx="100" cy="100" r="97"  fill="none" stroke="currentColor" stroke-width="0.5" opacity="0.25"/>
                        <circle cx="100" cy="100" r="95"  fill="none" stroke="currentColor" stroke-width="1.0" stroke-dasharray="5 7" opacity="0.60"/>
                        <circle cx="100" cy="100" r="92"  fill="none" stroke="currentColor" stroke-width="0.3" opacity="0.20"/>
                        <circle cx="100" cy="100" r="88"  fill="none" stroke="currentColor" stroke-width="0.4" stroke-dasharray="1 4" opacity="0.30"/>
                        <!-- 4 cardinal glowing nodes -->
                        <circle cx="100" cy="3"   r="3.5" fill="currentColor" opacity="0.90"/>
                        <circle cx="197" cy="100" r="3.5" fill="currentColor" opacity="0.90"/>
                        <circle cx="3"   cy="100" r="3.5" fill="currentColor" opacity="0.90"/>
                        <circle cx="100" cy="197" r="3.5" fill="currentColor" opacity="0.90"/>
                        <!-- 8 intercardinal nodes -->
                        <circle cx="167" cy="33"  r="2.2" fill="currentColor" opacity="0.55"/>
                        <circle cx="167" cy="167" r="2.2" fill="currentColor" opacity="0.55"/>
                        <circle cx="33"  cy="167" r="2.2" fill="currentColor" opacity="0.55"/>
                        <circle cx="33"  cy="33"  r="2.2" fill="currentColor" opacity="0.55"/>
                        <circle cx="134" cy="10"  r="1.5" fill="currentColor" opacity="0.35"/>
                        <circle cx="190" cy="66"  r="1.5" fill="currentColor" opacity="0.35"/>
                        <circle cx="10"  cy="134" r="1.5" fill="currentColor" opacity="0.35"/>
                        <circle cx="66"  cy="190" r="1.5" fill="currentColor" opacity="0.35"/>
                        <!-- Rune text arc -->
                        <text font-family="serif" font-size="4.8" fill="currentColor" opacity="0.42" letter-spacing="2.4">
                            <textPath href="#mc-text-ring">✦ ARCANUM ✦ IGNIS ✦ AQUA ✦ TERRA ✦ VENTUS ✦ LUX ✦ VIA ✦ SOMNIUM ✦</textPath>
                        </text>
                    </svg>
                    <!-- Middle ring: hexagram + double ring + tick marks (CCW, medium) -->
                    <svg class="mc-svg mc-mid" viewBox="0 0 200 200" aria-hidden="true">
                        <circle cx="100" cy="100" r="84" fill="none" stroke="currentColor" stroke-width="0.4" opacity="0.22"/>
                        <circle cx="100" cy="100" r="82" fill="none" stroke="currentColor" stroke-width="0.9" stroke-dasharray="2 4" opacity="0.45"/>
                        <circle cx="100" cy="100" r="80" fill="none" stroke="currentColor" stroke-width="0.3" opacity="0.18"/>
                        <!-- Hexagram (Star of David) -->
                        <polygon points="100,20 170,140 30,140" fill="none" stroke="currentColor" stroke-width="0.8" opacity="0.35"/>
                        <polygon points="100,180 30,60 170,60"  fill="none" stroke="currentColor" stroke-width="0.8" opacity="0.35"/>
                        <!-- 6 vertex nodes -->
                        <circle cx="100" cy="20"  r="2.5" fill="currentColor" opacity="0.65"/>
                        <circle cx="170" cy="140" r="2.5" fill="currentColor" opacity="0.65"/>
                        <circle cx="30"  cy="140" r="2.5" fill="currentColor" opacity="0.65"/>
                        <circle cx="100" cy="180" r="2.5" fill="currentColor" opacity="0.65"/>
                        <circle cx="30"  cy="60"  r="2.5" fill="currentColor" opacity="0.65"/>
                        <circle cx="170" cy="60"  r="2.5" fill="currentColor" opacity="0.65"/>
                        <!-- 12 tick marks around the ring -->
                        <line x1="100" y1="18" x2="100" y2="24" stroke="currentColor" stroke-width="0.6" opacity="0.30"/>
                        <line x1="141" y1="29" x2="138" y2="34" stroke="currentColor" stroke-width="0.6" opacity="0.30"/>
                        <line x1="171" y1="59" x2="165" y2="62" stroke="currentColor" stroke-width="0.6" opacity="0.30"/>
                        <line x1="182" y1="100" x2="176" y2="100" stroke="currentColor" stroke-width="0.6" opacity="0.30"/>
                        <line x1="171" y1="141" x2="165" y2="138" stroke="currentColor" stroke-width="0.6" opacity="0.30"/>
                        <line x1="141" y1="171" x2="138" y2="166" stroke="currentColor" stroke-width="0.6" opacity="0.30"/>
                        <line x1="100" y1="182" x2="100" y2="176" stroke="currentColor" stroke-width="0.6" opacity="0.30"/>
                        <line x1="59"  y1="171" x2="62"  y2="166" stroke="currentColor" stroke-width="0.6" opacity="0.30"/>
                        <line x1="29"  y1="141" x2="35"  y2="138" stroke="currentColor" stroke-width="0.6" opacity="0.30"/>
                        <line x1="18"  y1="100" x2="24"  y2="100" stroke="currentColor" stroke-width="0.6" opacity="0.30"/>
                        <line x1="29"  y1="59" x2="35"   y2="62" stroke="currentColor" stroke-width="0.6" opacity="0.30"/>
                        <line x1="59"  y1="29" x2="62"   y2="34" stroke="currentColor" stroke-width="0.6" opacity="0.30"/>
                    </svg>
                    <!-- Rune compass ring (NEW — draggable, CCW fast) -->
                    <svg class="mc-svg mc-rune" viewBox="0 0 200 200" aria-hidden="true">
                        <circle cx="100" cy="100" r="77" fill="none" stroke="currentColor" stroke-width="0.6" stroke-dasharray="1 3" opacity="0.30"/>
                        <circle cx="100" cy="100" r="75" fill="none" stroke="currentColor" stroke-width="0.8" opacity="0.40"/>
                        <!-- 8 rune symbols around the ring -->
                        <text x="100" y="27"  text-anchor="middle" fill="currentColor" font-size="7" opacity="0.50" font-family="serif">ᚠ</text>
                        <text x="153" y="53"  text-anchor="middle" fill="currentColor" font-size="7" opacity="0.50" font-family="serif">ᚢ</text>
                        <text x="175" y="103" text-anchor="middle" fill="currentColor" font-size="7" opacity="0.50" font-family="serif">ᚦ</text>
                        <text x="153" y="153" text-anchor="middle" fill="currentColor" font-size="7" opacity="0.50" font-family="serif">ᚨ</text>
                        <text x="100" y="178" text-anchor="middle" fill="currentColor" font-size="7" opacity="0.50" font-family="serif">ᚱ</text>
                        <text x="47"  y="153" text-anchor="middle" fill="currentColor" font-size="7" opacity="0.50" font-family="serif">ᚲ</text>
                        <text x="25"  y="103" text-anchor="middle" fill="currentColor" font-size="7" opacity="0.50" font-family="serif">ᚷ</text>
                        <text x="47"  y="53"  text-anchor="middle" fill="currentColor" font-size="7" opacity="0.50" font-family="serif">ᚹ</text>
                    </svg>
                    <!-- Inner ring: pentagon + triangle + triple rings (CW, fast) -->
                    <svg class="mc-svg mc-inner" viewBox="0 0 200 200" aria-hidden="true">
                        <circle cx="100" cy="100" r="73" fill="none" stroke="currentColor" stroke-width="0.4" opacity="0.22"/>
                        <circle cx="100" cy="100" r="71" fill="none" stroke="currentColor" stroke-width="1.1" opacity="0.70"/>
                        <circle cx="100" cy="100" r="69" fill="none" stroke="currentColor" stroke-width="0.3" opacity="0.18"/>
                        <circle cx="100" cy="100" r="65" fill="none" stroke="currentColor" stroke-width="0.5" stroke-dasharray="3 5" opacity="0.30"/>
                        <!-- Inner triangle -->
                        <polygon points="100,30 160,135 40,135" fill="none" stroke="currentColor" stroke-width="1.0" opacity="0.42"/>
                        <!-- Inner pentagon (inverted) -->
                        <polygon points="100,155 39,73 69,28 131,28 161,73" fill="none" stroke="currentColor" stroke-width="0.5" opacity="0.18"/>
                        <!-- Triangle vertex nodes -->
                        <circle cx="100" cy="30"  r="3" fill="currentColor" opacity="0.75"/>
                        <circle cx="160" cy="135" r="3" fill="currentColor" opacity="0.75"/>
                        <circle cx="40"  cy="135" r="3" fill="currentColor" opacity="0.75"/>
                    </svg>
                    <div class="portrait-img-wrap">
                        <img src="./Images/aru2_meta.png" alt="Aruta" class="portrait-img">
                    </div>
                </div>
                <div class="home-tagline">
                    <h1 class="char-name">Aruta.sh</h1>
                    <div class="char-class" data-i18n="char_class">Streamer · Programmer · Adventurer</div>
                </div>
            </div>
        </section>

        <!-- ── SECTION: About ── -->
        <section class="page-section" id="sec-about" hidden>
            <p class="char-bio" id="char-bio"></p>
            <div class="rune-divider"><div class="rune-line"></div><span class="rune-sym" aria-hidden="true">⋆ ✦ ⋆</span><div class="rune-line"></div></div>
            <div class="interest-grid" id="interest-grid"></div>
            <div class="rune-divider"><div class="rune-line"></div><span class="rune-sym" aria-hidden="true">⊕ ◈ ⊕</span><div class="rune-line"></div></div>
            <h2 class="section-title" data-i18n="projects_title">Progetti in Corso</h2>
            <div class="projects-grid" id="projects-grid"></div>
        </section>

        <!-- ── SECTION: Links ── -->
        <section class="page-section" id="sec-links" hidden>

            <div class="links-intro">
                <p class="links-desc" data-i18n="links_desc">Trovami su queste piattaforme</p>
            </div>

            <div class="link-cards" id="link-cards"></div>

        </section>

    </div><!-- .content-wrap -->

    <footer class="footer-bar">
        <span class="footer-copy">© <span id="footer-year">2025</span> Stefano Aruta. Tutti i diritti riservati.</span>
        <span class="footer-brand">aruta.sh</span>
        <div class="footer-socials">
            <a href="https://twitch.tv/aruta.sh"     target="_blank" rel="noopener" title="Twitch"><i class="fab fa-twitch"></i></a>
            <a href="https://kick.com/aruta_sh"      target="_blank" rel="noopener" title="Kick"><i class="fas fa-broadcast-tower"></i></a>
            <a href="https://youtube.com/@aruta.sh"  target="_blank" rel="noopener" title="YouTube"><i class="fab fa-youtube"></i></a>
            <a href="https://twitter.com/aruta.sh"   target="_blank" rel="noopener" title="Twitter/X"><i class="fab fa-twitter"></i></a>
            <a href="https://instagram.com/aruta_sr" target="_blank" rel="noopener" title="Instagram"><i class="fab fa-instagram"></i></a>
            <a href="https://github.com/Arutosio"    target="_blank" rel="noopener" title="GitHub"><i class="fab fa-github"></i></a>
        </div>
    </footer>
</main>

<script src="JavaScript/config.js"></script>
<script src="JavaScript/Index.js"></script>
<link rel="stylesheet" href="ArcaneDuel/arcane-duel.css">
<script src="ArcaneDuel/arcane-duel.js"></script>
</body>
</html>
