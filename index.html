<!DOCTYPE html>
<html lang="it" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Aruta — Il Mago Errante</title>
    <meta name="description" content="Stefano Aruta — Streamer su Twitch, Kick e YouTube. Programmatore, amante di anime, D&D e Ultima Online.">

    <!-- Favicon emoji -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧙</text></svg>">

    <!-- Browser chrome color (updated by JS on theme change) -->
    <meta name="theme-color" id="meta-theme-color" content="#08042a">

    <!-- Open Graph (link preview su Discord, Facebook, Telegram…) -->
    <meta property="og:type"        content="website">
    <meta property="og:url"         content="https://aruta.sh">
    <meta property="og:title"       content="Aruta — Il Mago Errante">
    <meta property="og:description" content="Streamer · Programmer · Adventurer. Benvenuto nel mondo di Aruta.">
    <meta property="og:image"       content="https://aruta.sh/Images/aru2_meta.png">

    <!-- Twitter / X Card -->
    <meta name="twitter:card"        content="summary_large_image">
    <meta name="twitter:site"        content="@aruta.sh">
    <meta name="twitter:title"       content="Aruta — Il Mago Errante">
    <meta name="twitter:description" content="Streamer · Programmer · Adventurer. Benvenuto nel mondo di Aruta.">
    <meta name="twitter:image"       content="https://aruta.sh/Images/aru2_meta.png">

    <!-- Preload portrait so it's ready when JS shows the page -->
    <link rel="preload" as="image" href="./Images/aru2_meta.png">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Almendra:ital,wght@0,400;0,700;1,400&family=IM+Fell+English:ital@0;1&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="Style/style.css">
</head>
<body>

<!-- SKY -->
<div class="sky"></div>
<canvas id="atmo"></canvas>
<div class="celestial" id="cel"><div class="cel-halo"></div></div>
<div class="cloud-layer">
    <div class="cloud" style="top:8%;  width:260px;height:62px;  animation-duration:80s;  animation-delay:0s;"></div>
    <div class="cloud" style="top:15%; width:175px;height:46px;  animation-duration:62s;  animation-delay:-22s; opacity:.7;"></div>
    <div class="cloud" style="top:4%;  width:320px;height:76px;  animation-duration:100s; animation-delay:-46s; opacity:.85;"></div>
    <div class="cloud" style="top:22%; width:140px;height:38px;  animation-duration:55s;  animation-delay:-35s; opacity:.55;"></div>
    <div class="cloud" style="top:11%; width:200px;height:52px;  animation-duration:74s;  animation-delay:-60s; opacity:.65;"></div>
</div>
<div class="vignette"></div>

<!-- PAGE -->
<main id="page" class="hidden">

    <div class="topbar">
        <div class="lang-row" role="group" aria-label="Language selector">
            <button class="lb" data-lang="it" aria-label="Italiano">IT</button>
            <button class="lb" data-lang="en" aria-label="English">EN</button>
            <button class="lb" data-lang="es" aria-label="Español">ES</button>
            <button class="lb" data-lang="ja" aria-label="日本語">JA</button>
        </div>
        <button id="tbtn" class="tbtn" aria-label="Toggle theme">
            <i class="fas fa-sun" id="ticon"></i>
        </button>
    </div>

    <!-- Sky area: character sprite -->
    <div class="vn-sky-area">
        <div class="vn-char">
            <img src="./Images/aru2_meta.png" alt="Aruta" class="vn-sprite">
        </div>
    </div>

    <!-- VN Dialogue Panel -->
    <div class="vn-dialog">
        <div class="vn-inner">

            <div class="vn-nametag">
                <p class="hero-pre" data-i18n="pre">The Wandering Mage</p>
                <h1 class="hero-name">Aruta</h1>
                <p class="hero-cls" data-i18n="cls">Streamer · Programmer · Adventurer</p>
            </div>

            <div class="rule"><span>✦</span></div>

            <p class="bio" id="bio"></p>

            <div class="tags" id="tags"></div>

            <nav class="socials" id="socials" aria-label="Social links"></nav>

            <p class="footer-note" id="footer-note"></p>

        </div>
    </div>

</main>

<script src="JavaScript/config.js"></script>
<script src="JavaScript/Index.js"></script>
</body>
</html>
